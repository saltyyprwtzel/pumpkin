<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpkin - Signup</title>
    <link rel="stylesheet" href="Style-signup.css">
</head>

<body>
    <div class="signup-container">

        <div class="signup-card">
            <h1>Pumpkin</h1>
            <img src="pumpkin.jpeg" alt="pumpkin">

            <form>
                <div class="signup-input">
                    <input type="text" name="username" placeholder="Enter your Username">
                    <input type="email" name="email" placeholder="Enter your Email">
                    <input type="password" name="password" placeholder="Enter your password">
                    <input type="password" name="repassword" placeholder="Confirm your password">
                </div>

                <div class="sign">
                    <a href="login.html" class="confirm-btn">Confirm</a>
                </div>
                <p id="signin-text">Already have an account?
                    <a href="login.html" id="signin-btn">Log In</a>
                </p>

            </form>
        </div>
    </div>
</body>

</html>
