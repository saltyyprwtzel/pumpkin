<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpkin - login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">

        <div class="login-card">
            <h1>Pumpkin</h1>
            <img src="pumpkin.jpeg" alt="pumpkin">

            <form>
                <div class="login-input">
                    <input type="email" name="email" id="email" placeholder="Enter your Email">
                    <input type="password" name="password" id="password" placeholder="Enter your password">
                </div>

                <div class="log">
                    <a href="dashboard.html" class="login-btn">Login</a>
                    <a href="#" class="forget-btn">Forgot password?</a>
                </div>
                <p id="signup-text">Don't have an account?
                    <a href="signup.html" id="signup-btn">Sign up</a>
                </p>

            </form>
        </div>
    </div>
</body>

</html>
